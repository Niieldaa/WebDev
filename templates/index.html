<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>F1 Leaderboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #111; color: white; padding: 20px; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
        button { background: #e10600; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { background: #b00500; }
        .container { max-width: 1000px; margin: auto; }
        table { margin: 20px auto; border-collapse: collapse; width: 100%; background: #1a1a1a; }
        th, td { padding: 12px; border: 1px solid #333; }
        th { background: #e10600; text-transform: uppercase; font-size: 12px; }
        .user-row { background: #2c3e50 !important; color: #00d2ff; font-weight: bold; }
        .del-btn { background: #444; font-size: 10px; padding: 4px 8px; }
        .section-title { border-left: 5px solid #e10600; text-align: left; padding-left: 15px; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏁 F1 Global Leaderboard with Costom Input</h1>

    <section style="background: #222; padding: 20px; border-radius: 10px; margin-bottom: 30px;">
        <h3>Add Your Entry</h3>
        <input type="text" id="userName" placeholder="Your Name">
        <input type="text" id="userTeam" placeholder="Your Team">
        <input type="text" id="userTime" placeholder="Lap Time (e.g. 1:32.450)">
        <button onclick="submitTime()">Submit Result</button>
    </section>

    <div style="background: #1a1a1a; padding: 15px; border-radius: 10px;">
        <input type="number" id="seasonInput" value="2026" style="width: 80px;">
        <select id="raceInput">
            <option value="Australia">1. Australia</option>
            <option value="China">2. China</option>
            <option value="Japan">3. Japan</option>
            <option value="Bahrain">4. Bahrain</option>
            </select>
        <button onclick="loadResults()">Search Session</button>
    </div>

    <h2 class="section-title">🏆 Race Classification (Official Times & Gaps)</h2>
    <table id="finishTable">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Team</th>
                <th>Time / Gap / Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2 class="section-title">⚡ Fastest Lap Ranking (Combined)</h2>
    <table id="fastestTable">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Team</th>
                <th>Lap Time</th>
                <th>Gap</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
function submitTime() {
    const data = {
        season: document.getElementById("seasonInput").value,
        race: document.getElementById("raceInput").value,
        name: document.getElementById("userName").value,
        team: document.getElementById("userTeam").value,
        time: document.getElementById("userTime").value
    };
    fetch('/add_entry', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => { loadResults(); alert("Added!"); });
}

function deleteEntry(id) {
    fetch('/delete_entry', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: id})
    }).then(() => loadResults());
}

function loadResults() {
    const season = document.getElementById("seasonInput").value;
    const race = document.getElementById("raceInput").value;
    const finishBody = document.querySelector("#finishTable tbody");
    const fastestBody = document.querySelector("#fastestTable tbody");

    finishBody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";
    fastestBody.innerHTML = "<tr><td colspan='6'>Loading...</td></tr>";

    fetch(`/results?season=${season}&race=${race}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) { alert("Data not found yet."); return; }

            // Render Finish Order
            finishBody.innerHTML = "";
            data.finish_order.forEach(d => {
                const isUser = d.Abbreviation.includes("(YOU)");
                const row = `<tr class="${isUser ? 'user-row' : ''}">
                    <td>${d.Position}</td>
                    <td>${d.Abbreviation}</td>
                    <td>${d.TeamName}</td>
                    <td>${d.Result}</td>
                </tr>`;
                finishBody.innerHTML += row;
            });

            // Render Fastest Laps
            fastestBody.innerHTML = "";
            data.fastest_laps.forEach(d => {
                const isUser = d.id !== null;
                const row = `<tr class="${isUser ? 'user-row' : ''}">
                    <td>${d.Position}</td>
                    <td>${d.Abbreviation}</td>
                    <td>${d.TeamName}</td>
                    <td>${d.LapTime}</td>
                    <td>${d.Gap}</td>
                    <td>${isUser ? `<button class="del-btn" onclick="deleteEntry(${d.id})">Delete</button>` : ''}</td>
                </tr>`;
                fastestBody.innerHTML += row;
            });
        });
}
</script>
</body>
</html>
