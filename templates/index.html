<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>F1 Results</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
        }

        th, td {
            padding: 10px;
            border: 1px solid #444;
        }

        th {
            background: #e10600;
        }

        tr:nth-child(even) {
            background: #222;
        }

        .fastest {
            color: #b300ff;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🏁 F1 Race Results</h1>

<input type="number" id="seasonInput" placeholder="Season (eg. 2026)">
<input type="text" id="raceInput" placeholder="Race (eg. Bahrain)">
<button onclick="loadResults()">Search</button>

<!-- 🏁 RACE TABLE -->
<h2>🏁 Race Table</h2>
<table id="resultsTable">
    <thead>
        <tr>
            <th>Position</th>
            <th>Driver</th>
            <th>Team</th>
            <th>Last Lap</th>
            <th>Gap</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- ⚡ FASTEST TABLE -->
<h2>⚡ Fastest Lap Ranking</h2>
<table id="fastestTable">
    <thead>
        <tr>
            <th>Position</th>
            <th>Driver</th>
            <th>Team</th>
            <th>Fastest Lap</th>
            <th>Gap</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

function loadResults() {

    const season = document.getElementById("seasonInput").value;
    const race = document.getElementById("raceInput").value;

    fetch(`/results?season=${season}&race=${race}`)
        .then(res => res.json())
        .then(data => {

            console.log(data);

            // ---------------- RACE TABLE ----------------
            const table1 = document.querySelector("#resultsTable tbody");
            table1.innerHTML = "";

            data.race.forEach(driver => {

                const row = document.createElement("tr");

                row.innerHTML =
                    "<td>" + driver.Position + "</td>" +
                    "<td>" + driver.Abbreviation + "</td>" +
                    "<td>" + driver.TeamName + "</td>" +
                    "<td>" + formatLapTime(driver.LapTime) + "</td>" +
                    "<td>" + driver.LastLapGap + "</td>";

                table1.appendChild(row);
            });

            // ---------------- FASTEST TABLE ----------------
            const table2 = document.querySelector("#fastestTable tbody");
            table2.innerHTML = "";

            data.fastest.forEach(driver => {

                const row = document.createElement("tr");

                row.innerHTML =
                    "<td>" + driver.Position + "</td>" +
                    "<td>" + driver.Abbreviation + "</td>" +
                    "<td>" + driver.TeamName + "</td>" +
                    "<td class='fastest'>" + formatLapTime(driver.FastestLap) + "</td>" +
                    "<td>" + driver.FastestLapGap + "</td>";

                table2.appendChild(row);
            });

        });
}

function formatLapTime(time) {
    if (!time) return "";
    return time.replace("0 days ", "");
}



</script>

</body>
</html>
